{% extends 'base.html' %}
{% block title %}Scheduler - TikTok AI{% endblock %}
{% block content %}
<div class="glass p-8 rounded-3xl">
    <h2 class="text-3xl font-bold mb-6">Post Scheduler</h2>
    <p class="opacity-70 mb-8">Schedule your videos and let the AI handle the rest.</p>
    <div class="border-2 border-dashed border-white/10 p-12 rounded-2xl flex flex-col items-center justify-center text-center">
        <svg class="w-12 h-12 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        <p class="text-lg font-medium">Upload a video to get started</p>
        <button class="mt-4 bg-primary px-6 py-2 rounded-full font-bold">New Post</button>
    </div>
</div>
{% endblock %}
