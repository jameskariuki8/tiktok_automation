[phases.setup]
nixPkgs = ["python", "playwright-driver.browsers", "glib", "nss", "nspr", "atk", "at-spi2-atk", "libdrm", "mesa", "dbus", "libxkbcommon", "pango", "cairo", "expat"]

[phases.install]
cmds = ["pip install -r requirements.txt", "PLAYWRIGHT_BROWSERS_PATH=/app/.cache playwright install chromium"]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.cache"
